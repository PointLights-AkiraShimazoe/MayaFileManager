name: Smoke Test (headless GUI)

# main/develop への push と PR で、画面なしGUIを実際に構築して回帰検知する。
# EXEビルドやReleaseは行わない（軽量・高速）。
on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  smoke:
    name: Headless GUI smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Qt runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 libglib2.0-0 libfontconfig1

      - name: Install PySide6
        run: python -m pip install --upgrade pip PySide6-Essentials

      - name: Run headless smoke test
        env:
          QT_QPA_PLATFORM: offscreen
        run: python tests/smoke_test.py
