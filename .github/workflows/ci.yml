name: CI – Syntax Check

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  syntax-check:
    # Maya 2023(3.9) / 2024(3.10) / 2025-2026(3.11) / 2027(3.13) の各同梱Pythonで構文互換を保証
    name: "Syntax Check (Python ${{ matrix.python }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.9", "3.10", "3.11", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: "${{ matrix.python }}"

      - name: Check syntax of all .py files
        run: |
          python3 - << 'EOF'
          import ast, sys, os

          errors = []
          for root, dirs, files in os.walk("."):
              dirs[:] = [d for d in dirs if d not in
                         ["__pycache__", ".git", "dist", "build", ".github"]]
              for fname in files:
                  if not fname.endswith(".py"):
                      continue
                  path = os.path.join(root, fname)
                  try:
                      ast.parse(open(path, encoding="utf-8").read())
                      print(f"  ✓  {path}")
                  except SyntaxError as e:
                      errors.append((path, e))
                      print(f"  ✗  {path}: {e}")

          print(f"\n{'OK' if not errors else 'FAILED'}: {len(errors)} syntax errors found")
          sys.exit(len(errors))
          EOF
